<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tracker — HDA</title>
    <link rel="stylesheet" href="/styles.css" />
    <!-- the ONLY client-side script: htmx. No app JavaScript is written. -->
    <script src="/static/htmx.min.js"></script>
    <!-- DEMO (issue 3): uncomment to load the same attacker script the SPA bundles.
         It runs, but the HttpOnly cookie is hidden from JS and localStorage is
         empty, so it exfiltrates nothing useful. See DEMOS.md.
    <script src="/static/malicious.js"></script>
    -->
  </head>
  <body>
    <header class="app-header">
      <div class="brand">TaskTracker <span class="tag">HDA · htmx</span></div>
      {% if me %}
      <div class="row">
        <span class="user">{{ me.username }} ({{ me.role }})</span>
        <form method="post" action="/logout" style="margin: 0">
          <button class="secondary">Log out</button>
        </form>
      </div>
      {% endif %}
    </header>
    {% block content %}{% endblock %}
  </body>
</html>
